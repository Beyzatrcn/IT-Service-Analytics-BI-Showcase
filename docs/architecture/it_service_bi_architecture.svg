<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EDF2F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .box-text { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #1E293B; }
      .note { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="70" y="78" class="title">IT Service Analytics BI Architektur</text>
  <text x="70" y="112" class="subtitle">Fiktives End-to-End-Zielbild fuer Management-Transparenz zu Kosten, Nutzung und Effizienz von IT-Services</text>

  <rect x="60" y="150" width="360" height="650" rx="26" fill="#DBEAFE" opacity="0.55"/>
  <rect x="470" y="150" width="410" height="650" rx="26" fill="#DCFCE7" opacity="0.60"/>
  <rect x="930" y="150" width="300" height="650" rx="26" fill="#FEF3C7" opacity="0.75"/>
  <rect x="1270" y="150" width="270" height="650" rx="26" fill="#FCE7F3" opacity="0.75"/>

  <text x="80" y="188" class="section">1. Quellsysteme</text>
  <text x="490" y="188" class="section">2. BI Integration und Datenmodell</text>
  <text x="950" y="188" class="section">3. Reporting Layer</text>
  <text x="1290" y="188" class="section">4. Management-Nutzung</text>

  <g filter="url(#shadow)">
    <rect x="85" y="225" width="310" height="150" rx="22" fill="#FFFFFF"/>
    <text x="110" y="265" class="box-title">SAP Finance</text>
    <text x="110" y="295" class="box-text">Monatliche Kostenbuchungen</text>
    <text x="110" y="320" class="box-text">Cost Center, G/L Accounts,</text>
    <text x="110" y="345" class="box-text">Kostenarten und Vendoren</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="85" y="405" width="310" height="150" rx="22" fill="#FFFFFF"/>
    <text x="110" y="445" class="box-title">Microsoft Dynamics</text>
    <text x="110" y="475" class="box-text">Servicekatalog, Service Owner,</text>
    <text x="110" y="500" class="box-text">Request-Volumen und</text>
    <text x="110" y="525" class="box-text">Automatisierungskontext</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="85" y="585" width="310" height="150" rx="22" fill="#FFFFFF"/>
    <text x="110" y="625" class="box-title">Lokale SQL Datenbanken</text>
    <text x="110" y="655" class="box-text">Nutzungsmetriken, aktive User,</text>
    <text x="110" y="680" class="box-text">Tickets, SLA-Erfuellung und</text>
    <text x="110" y="705" class="box-text">Verfuegbarkeitskennzahlen</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="495" y="225" width="360" height="120" rx="22" fill="#FFFFFF"/>
    <text x="520" y="265" class="box-title">Service Harmonisierung</text>
    <text x="520" y="295" class="box-text">Standardisierung des service_code</text>
    <text x="520" y="320" class="box-text">ueber alle Quellsysteme hinweg</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="495" y="385" width="360" height="150" rx="22" fill="#FFFFFF"/>
    <text x="520" y="425" class="box-title">Kostenmapping und Allokation</text>
