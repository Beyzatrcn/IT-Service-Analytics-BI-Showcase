    <text x="520" y="480" class="box-text">Shared-Cost-Allokation nach</text>
    <text x="520" y="505" class="box-text">Anteil aktiver User</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="495" y="575" width="360" height="170" rx="22" fill="#FFFFFF"/>
    <text x="520" y="615" class="box-title">Monatlicher Service Mart</text>
    <text x="520" y="645" class="box-text">Zusammenfuehrung von Kosten,</text>
    <text x="520" y="670" class="box-text">Nutzung, Requests und Tickets</text>
    <text x="520" y="695" class="box-text">mit KPI-Berechnungen fuer</text>
    <text x="520" y="720" class="box-text">Kosten pro User, Kosten pro Ticket</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="955" y="265" width="250" height="140" rx="22" fill="#FFFFFF"/>
    <text x="980" y="305" class="box-title">Reporting Views</text>
    <text x="980" y="335" class="box-text">vw_bi_service_monthly</text>
    <text x="980" y="360" class="box-text">vw_bi_service_summary</text>
    <text x="980" y="385" class="box-text">vw_bi_management_overview</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="955" y="465" width="250" height="200" rx="22" fill="#FFFFFF"/>
    <text x="980" y="505" class="box-title">Power BI Dashboard</text>
    <text x="980" y="535" class="box-text">Executive Overview</text>
    <text x="980" y="560" class="box-text">Service-Detailanalyse</text>
    <text x="980" y="585" class="box-text">Support und Effizienz</text>
    <text x="980" y="610" class="box-text">Kostenallokationstransparenz</text>
    <text x="980" y="645" class="note">Kern-KPIs:</text>
    <text x="980" y="670" class="box-text">Kosten pro Service, pro User,</text>
    <text x="980" y="695" class="box-text">Tickets, Kosten pro Ticket,</text>
    <text x="980" y="720" class="box-text">Effizienzindex</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="305" width="220" height="130" rx="22" fill="#FFFFFF"/>
    <text x="1320" y="345" class="box-title">Finance und Controlling</text>
    <text x="1320" y="375" class="box-text">Kostentransparenz</text>
    <text x="1320" y="400" class="box-text">Budget- und Effizienzsicht</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="485" width="220" height="130" rx="22" fill="#FFFFFF"/>
    <text x="1320" y="525" class="box-title">IT Leadership</text>
    <text x="1320" y="555" class="box-text">Service-Steuerung</text>
    <text x="1320" y="580" class="box-text">Priorisierung von Massnahmen</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="665" width="220" height="110" rx="22" fill="#FFFFFF"/>
    <text x="1320" y="705" class="box-title">Service Owner</text>
    <text x="1320" y="735" class="box-text">Nutzung, Support und Kosten</text>
  </g>

  <path d="M395 300 C440 300, 455 285, 495 285" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M395 480 C440 480, 455 470, 495 470" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M395 660 C440 660, 455 660, 495 660" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M675 345 C675 360, 675 370, 675 385" stroke="#059669" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M675 535 C675 550, 675 560, 675 575" stroke="#059669" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M855 660 C900 660, 910 620, 955 620" stroke="#059669" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M855 660 C900 660, 910 335, 955 335" stroke="#059669" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M1205 565 C1245 565, 1255 370, 1295 370" stroke="#D97706" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1205 565 C1245 565, 1255 550, 1295 550" stroke="#D97706" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1205 565 C1245 565, 1255 720, 1295 720" stroke="#D97706" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>

  <rect x="60" y="840" width="1480" height="90" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="90" y="875" class="small">Business Outcome</text>
  <text x="90" y="905" class="box-text">Ein integriertes BI-Zielbild fuer IT-Services: Finanzsicht aus SAP, Prozesskontext aus Dynamics, Nutzung und Support aus SQL, konsolidiert in einem Service-Mart fuer Power BI und Management-Entscheidungen.</text>
