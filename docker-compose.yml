services:
  postgres:
    image: postgres:17
    container_name: it-service-analytics-postgres
    environment:
      POSTGRES_DB: it_service_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d it_service_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
